<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collocations</title>
    <link rel="stylesheet" href="static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 Анализатор коллокаций</h1>
            <p class="subtitle">Найдите устойчивые словосочетания в вашем тексте</p>
        </header>

        <main>
            <div class="input-section">
                <div class="textarea-wrapper">
                    <textarea id="textInput" placeholder="Вставьте ваш текст здесь... (минимум 50 слов для хорошего результата)" rows="8"></textarea>
                    <div class="textarea-stats">
                        <span id="wordCount">0 слов</span>
                    </div>
                </div>
                
                <div class="controls">
                    <div class="control-group">
                        <label for="minFreq">Минимальная частота:</label>
                        <select id="minFreq">
                            <option value="1" selected>Все сочетания</option>
                            <option value="2">2 раза и больше</option>                            
                        </select>
                    </div>
                    
                    <button id="analyzeBtn" class="btn-primary">
                        <span class="btn-icon">🔍</span>
                        Анализировать
                    </button>
                </div>
            </div>

            <div id="loading" class="loading-spinner hidden">
                <div class="spinner"></div>
                <p>Анализируем текст...</p>
            </div>

            <div id="results" class="results-section hidden">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value" id="totalWords">0</div>
                        <div class="stat-label">Всего слов</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="uniqueWords">0</div>
                        <div class="stat-label">Уникальных</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="totalBigrams">0</div>
                        <div class="stat-label">Биграмм</div>
                    </div>
                </div>

                <div class="tabs">
                    <button class="tab-btn active" data-tab="pmi">По PMI</button>
                    <button class="tab-btn" data-tab="t_score">По T-score</button>
                    <button class="tab-btn" data-tab="dice">По Dice</button>
                    <button class="tab-btn" data-tab="frequency">По частоте</button>
                </div>

                <div class="table-container">
                    <table id="resultsTable">
                        <thead>
                            <tr>
                                <th>№</th>
                                <th>Словосочетание</th>
                                <th>Частота</th>
                                <th>PMI</th>
                                <th>T-score</th>
                                <th>Dice</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <!-- Данные будут вставлены через JavaScript -->
                        </tbody>
                    </table>
                </div>                
            </div>
        </main>

        <footer>
            <p>Проект по автоматическому выявлению коллокаций</p>
        </footer>
    </div>

    <script src="static/script.js"></script>
</body>
</html>
